          text: |-
            {
              "title": "The Pragmatic Programmer",
              "author": "Hunt & Thomas",
              "price": 250000,
              "tags": ["software", "craft"]
            }
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ _.token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
