collection:
  - name: Books
    meta:
      id: fld_refbookstore0000000000000000010
      created: 1700000000000
      modified: 1700000000000
      sortKey: -1700000000000
      description: ""
    children:
      - url: "{{ _.base_url }}/books"
        name: List Books
        meta:
          id: req_refbookstore0000000000000000100
          created: 1700000000000
          modified: 1700000000000
          isPrivate: false
          description: "Ambil daftar buku dengan paginasi."
          sortKey: -1700000000000
        method: GET
        parameters:
          - name: page
            value: "1"
            disabled: false
          - name: limit
            value: "20"
            disabled: false
        authentication:
          type: bearer
          token: "{{ _.token }}"
