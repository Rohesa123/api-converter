name: Deploy (Docker image ke GHCR)

# Auto-deploy SAAT ada push ke branch "deploy".
# Alur: kerja di main -> kalau siap rilis, merge main ke deploy -> push deploy.
# Bisa juga dijalankan manual lewat tombol "Run workflow".
on:
  push:
    branches: [deploy]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Gerbang test: deploy hanya lanjut kalau test lulus.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -B verify

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Siapkan tag & label image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
