spring.application.name=api

# Pakai PORT dari platform hosting (Render/Railway/Fly/Cloud Run); default 8080 saat lokal.
server.port=${PORT:8080}

# File besar (mis. Mitra.yaml ribuan baris) butuh batas multipart yang dinaikkan
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
